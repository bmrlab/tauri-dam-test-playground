rmpv.workspace = true
uuid = { workspace = true }
uhlc.workspace = true

[dev-dependencies]
tokio = { workspace = true }
futures = { workspace = true }
rand = "0.8.5"
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
