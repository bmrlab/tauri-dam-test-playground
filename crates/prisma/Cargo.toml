[package]
name = "prisma-lib"
version = "0.1.0"
edition = { workspace = true }

[dependencies]
sd_sync = { path = "../sync" }

prisma-client-rust = { workspace = true }
prisma-client-rust-cli = { workspace = true }
serde = { workspace = true, features = ["derive"] }
